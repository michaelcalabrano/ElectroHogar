<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHogar - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <header>
            <a href="index.html" class="logo-box">
                <img src="img/Logo.png" alt="Logo ElectroHogar">
            </a>
            
            <div class="empresa-nombre">ELECTROHOGAR</div>
            
            <nav>
                <a href="index.html">INICIO</a>
                <a href="login.html">INICIAR SESIÓN</a>
                <a href="galeria.html">GALERÍA</a>
            </nav>
        </header>

        <main>
            <div class="banner">
                INICIAR SESIÓN
            </div>

            <section class="login-section">
                <div class="login-form">
                    <h2>INICIAR SESIÓN</h2>
                    
                    <form action="#">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="ejemplo@correo.cl" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" placeholder="********" required>
                        </div>
                        
                        <button type="submit" class="btn-login">ENTRAR</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            DESARROLLADOR: MICHAEL NICOLÁS CALABRANO PARRAGUEZ
        </footer>

    </div> </body>
</html>
